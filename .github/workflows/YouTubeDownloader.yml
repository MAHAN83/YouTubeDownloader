name: 🎯 YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🔄 Download Mode'
        required: true
        type: choice
        options:
          - single
          - playlist
          - channel
          - search
        default: 'single'

      url:
        description: '🎬 URL or Search Query or channel name'
        required: true
        type: string

      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'

      quality:
        description: 'Quality (video/audio bitrate)'
        required: false
        type: string
        default: '720'

      max_videos:
        description: '🔢 Max results'
        required: false
        type: number
        default: 10

      split_threshold_mb:
        description: '📦 Split > MB (0=no)'
        required: false
        type: number
        default: 50

      # 🌐 NEW: Audio language selection
      audio_lang:
        description: '🌐 Audio Language (auto / fa / en)'
        required: false
        type: choice
        options:
          - auto
          - fa
          - en
        default: 'auto'

env:
  PYTHONUNBUFFERED: '1'
  DEBIAN_FRONTEND: 'noninteractive'
  AUDIO_LANG: ${{ github.event.inputs.audio_lang }}

jobs:
  download-and-process:
    name: 🚀 YouTube Downloader
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}

      - name: ⚡ Setup
        run: |
          python3 -c "import requests" 2>/dev/null || pip3 install -q requests
          command -v yt-dlp &>/dev/null || pip3 install -q yt-dlp
          command -v zip &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq zip)

      - name: 🎯 Download & Process
        run: |
          python3 << 'PYEOF'
          import os, json, time, re, subprocess, sys, hashlib
          import requests as rq
          from pathlib import Path
          from datetime import datetime

          M = os.environ.get('MODE', 'single')
          U = os.environ.get('URL')
          T = os.environ.get('TYPE', 'video')
          Q = os.environ.get('QUALITY', '720')
          MX = int(os.environ.get('MAX', '10'))
          SP = int(os.environ.get('SPLIT', '50'))
          AUDIO_LANG = os.environ.get('AUDIO_LANG', 'auto')

          API = 'https://hub.ytconvert.org/api/download'
          H = {
              'User-Agent': 'Mozilla/5.0',
              'Accept': 'application/json',
              'Content-Type': 'application/json'
          }

          def dl_video(u):
              e = 'mp3' if T == 'audio' else 'mp4'

              p = {
                  'url': u,
                  'os': 'linux',
                  'output': {
                      'type': 'audio' if T == 'audio' else 'video',
                      'format': e
                  }
              }

              # 🎧 AUDIO SETTINGS
              if T == 'audio':
                  p['audio'] = {'bitrate': f'{Q}k'}

                  # 🌐 language selection
                  if AUDIO_LANG != 'auto':
                      p['audio']['language'] = AUDIO_LANG

              for retry in range(3):
                  try:
                      rr = rq.post(API, json=p, headers=H, timeout=20)
                      if rr.status_code != 200:
                          continue

                      d = rr.json()
                      su = d.get('statusUrl')
                      if not su:
                          continue

                      for _ in range(60):
                          time.sleep(2)
                          sr = rq.get(su, headers=H, timeout=10)
                          if sr.status_code == 200:
                              sd = sr.json()
                              if sd.get('status') == 'completed':
                                  return {'u': sd.get('downloadUrl'), 'e': e}
                              if sd.get('status') in ['failed', 'error']:
                                  break
                  except:
                      time.sleep(2)

              return None

          def download_file(url, path):
              r = rq.get(url, stream=True)
              if r.status_code != 200:
                  return 0

              with open(path, 'wb') as f:
                  for chunk in r.iter_content(1024*64):
                      f.write(chunk)

              return path.stat().st_size

          print("🎬 STARTING DOWNLOAD...")
          result = dl_video(U)

          if result:
              Path("downloads").mkdir(exist_ok=True)
              fp = Path("downloads") / f"output.{result['e']}"
              size = download_file(result['u'], fp)
              print(f"✅ Done: {size/1e6:.2f} MB")
          else:
              print("❌ Failed")
              sys.exit(1)

          PYEOF

      - name: 📤 Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add .
          git commit -m "update download" || exit 0
          git push
